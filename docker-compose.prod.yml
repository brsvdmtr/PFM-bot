services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pfm_pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pfm-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    networks:
      - pfm-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3003:3000"
    depends_on:
      - api
    env_file: .env
    networks:
      - pfm-network

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    depends_on:
      - api
    env_file: .env
    networks:
      - pfm-network

volumes:
  pfm_pg_data:

networks:
  pfm-network:
    driver: bridge
