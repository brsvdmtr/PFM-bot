name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: brsvdmtr

jobs:
  # ── 1) Build all three images on GitHub-hosted runners (fast) ──────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
          - service: bot
            dockerfile: apps/bot/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pfm-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/pfm-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=pfm-${{ matrix.service }}
          cache-to: type=gha,scope=pfm-${{ matrix.service }},mode=max

  # ── 2) Deploy: SSH to server and pull the freshly pushed images ─────────────
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # Images are already built in the `build` job; server only needs to
          # `git pull` for config changes (compose + deploy.sh), log in to GHCR,
          # and `docker compose pull && up -d`. No compute on the 2GB server.
          ssh -i ~/.ssh/id_ed25519 \
              -o IdentitiesOnly=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=120 \
              -o ConnectTimeout=15 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e; \
             cd /srv/pfm; \
             echo '--- Deploying commit '$GITHUB_SHA' ---'; \
             git fetch origin main; \
             git reset --hard origin/main; \
             ./deploy.sh"
