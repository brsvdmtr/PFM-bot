name: Deploy to Timeweb

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          # ServerAliveInterval/CountMax keep the SSH connection alive during
          # long silent phases of `docker compose build` on a small server.
          # Without these, `docker compose build --no-cache` can go 5+ minutes
          # without sending anything to the client and the ssh session dies
          # with "client_loop: send disconnect: Broken pipe", leaving the
          # server mid-deploy (images built but containers not restarted).
          ssh -i ~/.ssh/id_ed25519 \
              -o IdentitiesOnly=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=120 \
              -o ConnectTimeout=15 \
              "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e; \
             cd /srv/pfm; \
             echo '--- Deploying commit '$GITHUB_SHA' ---'; \
             git fetch origin main; \
             git reset --hard origin/main; \
             ./deploy.sh"
